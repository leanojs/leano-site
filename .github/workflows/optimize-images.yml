name: Optimize Images

on:
  pull_request:
    paths:
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.png"
      - "**/*.webp"
    paths-ignore:
      - "public/og-image.*"
      - "public/images/og-image.*"

  push:
    branches: [master]
    paths:
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.png"
      - "**/*.webp"

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Optimize images
        id: optimize
        uses: meowbeen/webpocalypse-action@v1
        with:
          format: avif
          quality: 82
          lossless: false
          changed-only: true
          paths: public/images
          commit-back: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        run: |
          echo "Files converted : ${{ steps.optimize.outputs.files-converted }}"
          echo "Bytes saved     : ${{ steps.optimize.outputs.bytes-saved }}"
          echo "Savings         : ${{ steps.optimize.outputs.savings-percent }}%"
